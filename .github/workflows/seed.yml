name: Seed Database

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
